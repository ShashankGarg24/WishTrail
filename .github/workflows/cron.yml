name: Scheduled API Crons

on:
	schedule:
		# Nightly quote generation for morning motivation personalization
		- cron: '0 1 * * *'
		# Cleanup old notifications
		- cron: '0 2 * * *'
		# Hourly trigger; service itself enforces local-time windows per user
		- cron: '0 * * * *'
	workflow_dispatch:

jobs:
	nightly-quotes:
		if: github.event.schedule == '0 1 * * *' || github.event_name == 'workflow_dispatch'
		runs-on: ubuntu-latest
		steps:
			- name: Trigger nightly quotes
				run: |
					curl -fsS -X POST "$API_BASE/cron/nightly-quotes?key=$CRON_SECRET"
				env:
					API_BASE: https://wishtrail-web.onrender.com/api/v1
					CRON_SECRET: ${{ secrets.CRON_SECRET }}

	delete-old-notifications:
		if: github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch'
		runs-on: ubuntu-latest
		steps:
			- name: Trigger delete old notifications
				run: |
					curl -fsS -X POST "$API_BASE/cron/delete-old-notifications?key=$CRON_SECRET"
				env:
					API_BASE: https://wishtrail-web.onrender.com/api/v1
					CRON_SECRET: ${{ secrets.CRON_SECRET }}

	morning-quotes:
		if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
		runs-on: ubuntu-latest
		steps:
			- name: Trigger morning quotes
				run: |
					curl -fsS -X POST "$API_BASE/cron/morning-quotes?key=$CRON_SECRET"
				env:
					API_BASE: https://wishtrail-web.onrender.com/api/v1
					CRON_SECRET: ${{ secrets.CRON_SECRET }}

	daily-logs-prompts:
		if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
		runs-on: ubuntu-latest
		steps:
			- name: Trigger daily-logs prompts
				run: |
					curl -fsS -X POST "$API_BASE/cron/daily-logs-prompts?key=$CRON_SECRET"
				env:
					API_BASE: https://wishtrail-web.onrender.com/api/v1
					CRON_SECRET: ${{ secrets.CRON_SECRET }}


