<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WishTrail Splash Preview</title>
    <style>
      :root {
        --bg: #e8edf5;
        --card: #f5f7fb;
        --title: #4d5f6e;
        --subtitle: #6f95b6;
        --track: #d3d3d3;
        --bar: #007bff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      .screen {
        width: min(420px, 100vw);
        height: min(860px, 100vh);
        position: relative;
        background: var(--bg);
        overflow: hidden;
      }

      .center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .logo-shell {
        width: 126px;
        height: 126px;
        border-radius: 30px;
        background: var(--card);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
      }

      .logo {
        width: 76px;
        height: 76px;
        border-radius: 22px;
        object-fit: contain;
        display: block;
      }

      .logo-clip {
        width: 84px;
        height: 84px;
        border-radius: 22px;
        overflow: hidden;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .title {
        margin: 0 0 4px;
        color: var(--title);
        font-size: 34px;
        line-height: 1;
        font-weight: 600;
      }

      .subtitle {
        margin: 0;
        color: var(--subtitle);
        font-size: 11px;
        letter-spacing: 2.1px;
      }

      .loader-wrap {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 64px;
        display: grid;
        place-items: center;
      }

      .track {
        width: 86px;
        height: 4px;
        border-radius: 2px;
        background: var(--track);
        overflow: hidden;
        position: relative;
      }

      .indicator {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 28px;
        border-radius: 2px;
        background: var(--bar);
        transform: translateX(-28px);
        animation: slide 900ms linear infinite;
      }

      @keyframes slide {
        from {
          transform: translateX(-28px);
        }
        to {
          transform: translateX(86px);
        }
      }
    </style>
  </head>
  <body>
    <main class="screen" aria-label="WishTrail splash preview">
      <section class="center">
        <div class="logo-shell">
          <div class="logo-clip">
            <img class="logo" src="/logo.png" alt="WishTrail Logo" />
          </div>
        </div>
        <h1 class="title">WishTrail</h1>
        <p class="subtitle">FIND YOUR PATH</p>
      </section>

      <section class="loader-wrap" aria-label="Loading">
        <div class="track">
          <div class="indicator"></div>
        </div>
      </section>
    </main>
  </body>
</html>
